<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flipper Zero Style Accordion</title>
    <style>
        :root {
            --font-h6-family: "Inter", sans-serif;
            --font-h6-weight: 600;
            --font-h6-size: 16px;
            --color-border-rgb: 0, 0, 0;
            --spacing-scale-default: 1rem;
            --transition-speed: 0.3s;
        }

        body {
            font-family: var(--font-h6-family);
            padding: 2rem;
            background-color: #f5f5f5;
        }

        /* Container styling based on the "accordion" classes in screenshot */
        .accordion-container {
            max-width: 600px;
            margin: 0 auto;
            border-top: 1px solid rgba(var(--color-border-rgb), 0.1);
        }

        accordion-custom {
            display: block;
            border-bottom: 1px solid rgba(var(--color-border-rgb), 0.1);
        }

        /* The Details Element */
        .details {
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* The Header / Summary */
        .details__header {
            list-style: none;
            cursor: pointer;
            padding: var(--spacing-scale-default) 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-family: var(--font-h6-family);
            font-weight: var(--font-h6-weight);
            font-size: var(--font-h6-size);
            user-select: none;
        }

        /* Remove default marker */
        .details__header::-webkit-details-marker {
            display: none;
        }

        /* Custom Caret Icon */
        .details__header::after {
            content: '';
            width: 10px;
            height: 10px;
            border-right: 2px solid currentColor;
            border-bottom: 2px solid currentColor;
            transform: rotate(45deg);
            transition: transform var(--transition-speed) ease;
            margin-right: 5px;
        }

        details[open] .details__header::after {
            transform: rotate(-135deg);
        }

        /* Content Container */
        .details-content {
            padding-bottom: var(--spacing-scale-default);
            line-height: 1.5;
            color: #444;
            opacity: 0;
            transform: translateY(-10px);
            transition: opacity var(--transition-speed) ease, transform var(--transition-speed) ease;
        }

        details[open] .details-content {
            opacity: 1;
            transform: translateY(0);
        }

        /* Hover Effect */
        .details__header:hover {
            color: #ff8200; /* Flipper Orange */
        }
    </style>
</head>
<body>

    <div class="accordion-container">
        <accordion-custom>
            <details class="details">
                <summary class="details__header">Technical Specifications</summary>
                <div class="details-content">
                    Dual-core ARM Cortex-M4 168 MHz, 1024 KB Flash, 192 KB RAM. High-performance microcontroller for real-time radio and hardware protocols.
                </div>
            </details>
        </accordion-custom>

        <accordion-custom open-by-default-on-desktop>
            <details class="details" open>
                <summary class="details__header">What's in the box?</summary>
                <div class="details-content">
                    - Flipper Zero<br>
                    - USB-C Cable<br>
                    - User Manual<br>
                    - Flipper Stickers
                </div>
            </details>
        </accordion-custom>
    </div>

    <script>
        class AccordionCustom extends HTMLElement {
            constructor() {
                super();
                this._details = null;
                this._summary = null;
                this._content = null;
                this._animation = null;
                this._isClosing = false;
                this._isExpanding = false;
            }

            connectedCallback() {
                // Initialize references
                this._details = this.querySelector('details');
                this._summary = this.querySelector('summary');
                this._content = this.querySelector('.details-content');

                // Check for initial state based on attributes or mobile/desktop logic
                if (this.hasAttribute('open-by-default-on-desktop') && window.innerWidth > 990) {
                    this._details.open = true;
                }

                // Attach click listener for smooth animation
                this._summary.addEventListener('click', (e) => this.onClick(e));
            }

            onClick(e) {
                // Prevent default toggling so we can animate it
                e.preventDefault();
                
                if (this._isClosing || !this._details.open) {
                    this.open();
                } else if (this._isExpanding || this._details.open) {
                    this.shrink();
                }
            }

            shrink() {
                this._isClosing = true;
                const startHeight = `${this._details.offsetHeight}px`;
                const endHeight = `${this._summary.offsetHeight}px`;

                if (this._animation) this._animation.cancel();

                this._animation = this._details.animate({
                    height: [startHeight, endHeight]
                }, {
                    duration: 300,
                    easing: 'ease-out'
                });

                this._animation.onfinish = () => this.onAnimationFinish(false);
                this._animation.oncancel = () => this._isClosing = false;
            }

            open() {
                // Apply 'open' attribute before measuring height
                this._details.style.height = `${this._details.offsetHeight}px`;
                this._details.open = true;
                
                // Allow browser to render 'open' state, then measure
                window.requestAnimationFrame(() => this.expand());
            }

            expand() {
                this._isExpanding = true;
                const startHeight = `${this._details.offsetHeight}px`;
                const endHeight = `${this._summary.offsetHeight + this._content.offsetHeight}px`;

                if (this._animation) this._animation.cancel();

                this._animation = this._details.animate({
                    height: [startHeight, endHeight]
                }, {
                    duration: 300,
                    easing: 'ease-out'
                });

                this._animation.onfinish = () => this.onAnimationFinish(true);
                this._animation.oncancel = () => this._isExpanding = false;
            }

            onAnimationFinish(open) {
                this._details.open = open;
                this._animation = null;
                this._isClosing = false;
                this._isExpanding = false;
                this._details.style.height = '';
            }
        }

        // Define the custom element
        customElements.define('accordion-custom', AccordionCustom);
    </script>
</body>
</html>
